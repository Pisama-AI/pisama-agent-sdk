name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install build
      - run: python -m build
      - name: Smoke test wheel
        run: |
          python -m venv /tmp/wheel-smoke
          /tmp/wheel-smoke/bin/pip install --quiet dist/*.whl
          EXPECTED_VERSION="${GITHUB_REF_NAME#v}" /tmp/wheel-smoke/bin/python - <<'PY'
          import os
          import pisama_agent_sdk
          from pisama_agent_sdk.atif import AtifAnalyzeResult, SUPPORTED_SCHEMA_VERSIONS

          assert pisama_agent_sdk.__version__ == os.environ["EXPECTED_VERSION"]
          assert "ATIF-v1.7" in SUPPORTED_SCHEMA_VERSIONS
          result = AtifAnalyzeResult.from_response({
              "trace": {
                  "trace_id": "release-smoke",
                  "span_count": 1,
                  "total_tokens": 3,
                  "atif_schema_version": "ATIF-v1.7",
                  "topology_complete": True,
              },
              "diagnosis": {
                  "detection_status": "complete",
                  "detectors_failed": {},
                  "all_detections": [],
              },
          })
          assert result.analysis_complete
          print(f"smoke OK: pisama-agent-sdk {pisama_agent_sdk.__version__}")
          PY

  publish:
    needs: smoke
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          echo "tag_version=$TAG_VERSION pyproject=$PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag declares v$TAG_VERSION but pyproject.toml is $PKG_VERSION"
            exit 1
          fi
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
